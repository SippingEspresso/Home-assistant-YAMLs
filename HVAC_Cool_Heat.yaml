alias: HVAC Heat_Cool
description: >-
  Sets the climate.entryway to the same settings as climate.master_bedroom based on hvac_mode.
triggers:
  - trigger: state
    entity_id: climate.master_bedroom
    attribute: temperature
  - trigger: state
    entity_id: climate.master_bedroom
    attribute: target_temp_high
  - trigger: state
    entity_id: climate.master_bedroom
    attribute: target_temp_low
  - trigger: state
    entity_id: climate.master_bedroom
conditions:
  - condition: or
    conditions:
      - condition: and
        conditions:
          - condition: template
            value_template: >
              {{ states('climate.master_bedroom') in ['heat', 'cool'] }}
          - condition: template
            value_template: >
              {{ state_attr('climate.master_bedroom', 'temperature') != state_attr('climate.entryway', 'temperature') }}
          - condition: template
            value_template: >
              {{ state_attr('climate.master_bedroom', 'temperature') is not none }}
      - condition: and
        conditions:
          - condition: template
            value_template: >
              {{ states('climate.master_bedroom') == 'heat_cool' }}
          - condition: or
            conditions:
              - condition: template
                value_template: >
                  {{ state_attr('climate.master_bedroom', 'target_temp_high') != state_attr('climate.entryway', 'target_temp_high') }}
              - condition: template
                value_template: >
                  {{ state_attr('climate.master_bedroom', 'target_temp_low') != state_attr('climate.entryway', 'target_temp_low') }}
          - condition: template
            value_template: >
              {{ state_attr('climate.master_bedroom', 'target_temp_high') is not none }}
          - condition: template
            value_template: >
              {{ state_attr('climate.master_bedroom', 'target_temp_low') is not none }}
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states('climate.master_bedroom') in ['heat', 'cool'] }}
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: climate.entryway
            data:
              temperature: "{{ state_attr('climate.master_bedroom', 'temperature') }}"
          - action: system_log.write
            data:
              message: >
                Synced climate.entryway temperature to {{ state_attr('climate.master_bedroom', 'temperature') }} 
                to match climate.master_bedroom ({{ states('climate.master_bedroom') }} mode).
              level: info
              logger: homeassistant.components.automation.hvac_heat_cool
      - conditions:
          - condition: template
            value_template: >
              {{ states('climate.master_bedroom') == 'heat_cool' }}
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: climate.entryway
            data:
              target_temp_high: "{{ state_attr('climate.master_bedroom', 'target_temp_high') }}"
              target_temp_low: "{{ state_attr('climate.master_bedroom', 'target_temp_low') }}"
          - action: system_log.write
            data:
              message: >
                Synced climate.entryway temperature to High: {{ state_attr('climate.master_bedroom', 'target_temp_high') }}, Low: {{ state_attr('climate.master_bedroom', 'target_temp_low') }} 
                to match climate.master_bedroom (heat_cool mode).
              level: info
              logger: homeassistant.components.automation.hvac_heat_cool
